services:
  - type: web
    name: online-grocery
    env: python
    buildCommand: ""
    startCommand: gunicorn run:app
    envVars:
      - key: MYSQL_HOST
        value: your-db-host
      - key: MYSQL_USER
        value: your-db-user
      - key: MYSQL_PASSWORD
        value: your-db-password
      - key: MYSQL_DATABASE
        value: your-db-name
